<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Produtos Orgânicos</title>
  <link rel="stylesheet" href="src/styles/index.css" />
</head>

<body>
  <div class="container">
    <div class="logo">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 21c4.5-1.5 8-6 8-11V4s-7 .5-10 4c-2.5 2.5-3 6-1.5 8.5M4 20c2-2 4-3 7-4" />
      </svg>
    </div>

    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre na sua conta para acessar produtos orgânicos frescos</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16v12H4z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 7l8 6 8-6" />
            </svg>
          </span>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
              <rect x="5" y="11" width="14" height="9" rx="2"></rect>
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 11V8a4 4 0 0 1 8 0v3" />
            </svg>
          </span>
          <input type="password" id="senhaLogin" placeholder="••••••••" required />
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
            <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z" />
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" />
          <span>Lembrar de mim</span>
        </label>
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>

      <a href="telaInicial.html"><button type="button" class="btn btn-primary">Entrar</button></a>

      <div class="divider">
        <span>Não tem uma conta?</span>
      </div>

      <a href="cadastroCliente.html"><button type="button" class="btn btn-outline">Cadastrar-se</button></a>

    </form>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
