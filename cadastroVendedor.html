<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Vendedor</title>
  <link rel="stylesheet" href="src/styles/style.css" />
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="header">
        <h1>Criar Conta</h1>
        <p>Preencha os dados abaixo para criar sua conta de Vendedor</p>
      </div>

      <div class="account-type">
        <a href="cadastroVendedor.html"><button type="button" class="type-btn active">Vendedor</button></a>
        <a href="cadastroCliente.html"><button type="button" class="type-btn">Cliente</button></a>
        <a href="cadastroEntregador.html"><button type="button" class="type-btn">Entregador</button></a>
      </div>

      <form id="vendedorForm" class="form-grid">
        <div class="form-group">
          <label for="loja">Nome da Loja *</label>
          <input type="text" id="loja" placeholder="Sua Loja" />
        </div>

        <div class="form-group">
          <label for="responsavel">Nome do Responsável *</label>
          <input type="text" id="responsavel" placeholder="Seu nome completo" />
        </div>

        <div class="form-group">
          <label for="cnpj">CNPJ *</label>
          <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" />
        </div>

        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label for="telefone">Telefone/WhatsApp *</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
        </div>

        <div class="form-group full">
          <label>Tipos de Produtos que Cultiva *</label>
          <div class="checkbox-grid">
            <label><input type="checkbox" name="produtos" value="Verduras" /> Verduras</label>
            <label><input type="checkbox" name="produtos" value="Legumes" /> Legumes</label>
            <label><input type="checkbox" name="produtos" value="Frutas" /> Frutas</label>
            <label><input type="checkbox" name="produtos" value="Grãos" /> Grãos</label>
            <label><input type="checkbox" name="produtos" value="Hortaliças" /> Hortaliças</label>
            <label><input type="checkbox" name="produtos" value="Outros" /> Outros</label>
          </div>
        </div>

        <div class="form-group"> <!-- Criar máscara para CEP -marcZ -->
          <label for="cep">CEP *</label>
          <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
        </div>

        <div class="form-group full">
          <label for="endereco">Endereço *</label>
          <input type="text" id="endereco" placeholder="Nome da Rua" />
        </div>

        <div class="form-group">
          <label for="num_endereco">Número do Endereço *</label>
          <input type="number" id="num_endereco" placeholder="Número" />
        </div>

        <!-- Tem que tirar isso aqui quando possível, não tirei ainda pra não dar b.o nos testes do Banco de Dados -marcZ
        <div class="checkbox-box full">
          <label>
            <input type="checkbox" id="certificacao" />
            Possuo certificação de produtos orgânicos
          </label>
        </div>
      -->

        <div class="form-group password-group">
          <label for="senha">Senha *</label>
          <div class="input-password">
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
            <button type="button" class="toggle-password" data-target="senha">👁</button>
          </div>
        </div>

        <div class="form-group password-group">
          <label for="confirmarSenha">Confirmar Senha *</label>
          <div class="input-password">
            <input type="password" id="confirmarSenha" placeholder="Repita a senha" />
            <button type="button" class="toggle-password" data-target="confirmarSenha">👁</button>
          </div>
        </div>

          <div class="checkbox-box full terms">
            <label>
              <input type="checkbox" id="terms" />
              Li e aceito os <a href="termosUso.html" target="_blank">termos de uso</a> e política de privacidade *
            </label>
          </div>

        <div class="full">
          <button type="submit" class="submit-btn">Cadastrar como Vendedor</button>
        </div>

        <div class="home">
          <a href="index.html"><button type="button" class="home-btn"> Voltar para tela de Login</button></a>
        </div>


        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="js/cadastroVendedor.js"></script>
</body>

</html>
