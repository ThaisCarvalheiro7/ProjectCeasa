<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="src/styles/style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="header">
        <h1>Criar Conta</h1>
        <p>Preencha os dados abaixo para criar sua conta de Cliente</p>
      </div>

      <div class="account-type">
        <a href="cadastroCliente.html"><button class="type-btn active">Cliente</button></a>
        <a href="cadastroEntregador.html"><button class="type-btn">Entregador</button></a>
      </div>

      <form id="clientForm" class="form-grid">
        <div class="form-group full">
          <label for="nome">Nome Completo *</label>
          <input type="text" id="nome" placeholder="Seu nome completo" />
        </div>

        <div class="form-group">
          <label for="cpfCnpj">CPF ou CNPJ *</label>
          <input type="text" id="cpfCnpj" placeholder="000.000.000-00 ou 00.000.000/0000-00" maxlength="18" />
        </div>

        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label for="telefone">Telefone/WhatsApp *</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
        </div>

        <div class="form-group"> <!-- Criar máscara para CEP -marcZ -->
          <label for="cep">CEP *</label>
          <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
        </div>


        <div class="form-group full">
          <label for="endereco">Endereço *</label>
          <input type="text" id="endereco" placeholder="Nome da Rua" />
        </div>

        <div class="form-group">
          <label for="num_Endereco">Número do Endereço *</label>
          <input type="number" id="num_Endereco" placeholder="Número" />
        </div>

        <div class="checkbox-box full terms">
          <label>
            <input type="checkbox" id="terms" />
            Li e aceito os <a href="termosUso.html" target="_blank">termos de uso</a> e política de privacidade *
          </label>
        </div>

        <div class="form-group password-group">
          <label for="senha">Senha *</label>
          <div class="input-password">
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
            <button type="button" class="toggle-password" data-target="senha">👁</button>
          </div>
        </div>

        <div class="form-group password-group">
          <label for="confirmarSenha">Confirmar Senha *</label>
          <div class="input-password">
            <input type="password" id="confirmarSenha" placeholder="Repita a senha" />
            <button type="button" class="toggle-password" data-target="confirmarSenha">👁</button>
          </div>
        </div>

        <div class="full">
          <button type="submit" class="submit-btn">Cadastrar como Cliente</button>
        </div>

        <div class="home">
          <a href="index.html"><button type="button" class="home-btn"> Voltar para tela de Login</button></a>
        </div>

        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="js/cadastroCliente.js"></script>
</body>
</html>
