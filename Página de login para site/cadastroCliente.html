<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="/src/styles/cadastroCliente.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="header">
        <h1>Criar Conta</h1>
        <p>Preencha os dados abaixo para criar sua conta de cliente</p>
      </div>

      <div class="account-type">
        <a href="/cadastroProdutor.html"><button class="type-btn">Produtor</button></a>
        <a href="/cadastroCliente.html"><button class="type-btn active">Cliente</button></a>
        <a href="/cadastroMotoboy.html"><button class="type-btn">Motoboy</button></a>
      </div>

      <form id="clientForm" class="form-grid">
        <div class="form-group full">
          <label for="nome">Nome Completo *</label>
          <input type="text" id="nome" placeholder="Seu nome completo" />
        </div>

        <div class="form-group">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
        </div>

        <div class="form-group">
          <label for="email">E-mail *</label>
          <input type="email" id="email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label for="telefone">Telefone/WhatsApp *</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
        </div>

        <div class="form-group">
          <label for="nascimento">Data de Nascimento *</label>
          <input type="date" id="nascimento" />
        </div>

        <div class="form-group">
          <label for="cidade">Cidade *</label>
          <input type="text" id="cidade" placeholder="Sua cidade" />
        </div>

        <div class="form-group">
          <label for="estado">Estado *</label>
          <input type="text" id="estado" placeholder="UF" maxlength="2" />
        </div>

        <div class="form-group full">
          <label for="endereco">Endereço Completo *</label>
          <input type="text" id="endereco" placeholder="Rua, número, bairro, complemento" />
        </div>

        <div class="checkbox-box full">
          <label>
            <input type="checkbox" id="newsletter" />
            Desejo receber novidades e ofertas por e-mail ou WhatsApp
          </label>
        </div>

        <div class="checkbox-box full terms">
          <label>
            <input type="checkbox" id="terms" />
            Li e aceito os termos de uso e política de privacidade *
          </label>
        </div>

        <div class="form-group password-group">
          <label for="senha">Senha *</label>
          <div class="input-password">
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
            <button type="button" class="toggle-password" data-target="senha">👁</button>
          </div>
        </div>

        <div class="form-group password-group">
          <label for="confirmarSenha">Confirmar Senha *</label>
          <div class="input-password">
            <input type="password" id="confirmarSenha" placeholder="Repita a senha" />
            <button type="button" class="toggle-password" data-target="confirmarSenha">👁</button>
          </div>
        </div>

        <div class="full">
          <button type="submit" class="submit-btn">Cadastrar como Cliente</button>
        </div>

        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="/js/cadastroCliente.js"></script>
</body>
</html>
